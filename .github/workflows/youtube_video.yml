name: YouTube Video Generator

on:
  push:
    paths:
      - 'audio/**.mp3'

jobs:
  build_video:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install pillow numpy

      - name: Detect new MP3s
        id: detect
        shell: bash
        run: |
          NEW_FILES=$(git diff --name-only --diff-filter=AM HEAD^ HEAD -- 'audio/*.mp3' || true)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NEW_FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Generate videos
        if: steps.detect.outputs.files != ''
        shell: bash
        run: |
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "Processing $f"
            python3 pipeline/scripts/video_generator.py --file "$f"
          done <<< "${{ steps.detect.outputs.files }}"

      - name: Generate YouTube metadata
        if: steps.detect.outputs.files != ''
        run: python3 pipeline/scripts/youtube_optimizer.py

      - name: Commit generated MP4 + metadata
        if: steps.detect.outputs.files != ''
        shell: bash
        run: |
          git config user.name "molefm-bot"
          git config user.email "molefm945@gmail.com"
          mkdir -p videos/queue
          git add videos/queue/
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-generated YouTube video + metadata"
            git push
          fi
